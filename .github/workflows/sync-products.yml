name: Sync Products from Google Sheets

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4



      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install csv-parse

      - name: Download Google Sheet CSV
        run: |
          pwd
          ls -la
          curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vTa6ULaDZ8TEbpNKru_yqbGHWIryKzlfl_n9kvOiI27GBOrbhdEzgX0KA280WYVZbHXYSedBveys_8u/pub?output=csv" -o data.csv
          ls -la
          cat data.csv

      - name: Build products.json
        run: node convert-products.js

      - name: Debug products.json
        run: cat products.json

      - name: Commit updated products
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
          git add products.json
      
          git commit -m "Auto update products from Google Sheets" || echo "No changes to commit"
      
          git push
