<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Benj's Store</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Benj's Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart 🛒</a>
    </nav>
</header>

<section class="hero">

    <h1>Products</h1>

    <div class="filter-bar">
        <input type="text" id="search" placeholder="Search products…">
        <select id="category">
            <option value="All">All</option>
        </select>
    </div>

    <div id="product-list"></div>

</section>

<div id="product-modal" class="product-modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-name" hidden>
    <div class="product-modal-box">
        <button type="button" class="product-modal-close" aria-label="Close">&times;</button>
        <div id="product-modal-content"></div>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/products.js"></script>

</body>
</html>
