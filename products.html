<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Benj's Store</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Benj's Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html" id="cart-link">Cart 🛒 (0)</a>
    </nav>
</header>

<section class="hero">

    <h1>Products</h1>

    <div class="filter-bar">
        <input type="text" id="search" placeholder="Search products…">

        <div class="category-menu" id="category-menu">
            <button type="button" id="category-trigger" class="category-trigger"
                    aria-haspopup="true" aria-expanded="false">
                <span id="category-label">All categories</span>
                <span class="chevron" aria-hidden="true">▾</span>
            </button>
            <ul id="category-dropdown" class="category-dropdown" role="menu"></ul>
        </div>
    </div>

    <div id="product-list"></div>

</section>

<div id="product-modal" class="product-modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-name" hidden>
    <div class="product-modal-box">
        <button type="button" class="product-modal-close" aria-label="Close">&times;</button>
        <div id="product-modal-content"></div>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/products.js"></script>

</body>
</html>
